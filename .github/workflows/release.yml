name: Build and Release

on:
  repository_dispatch:
    types: [rgb-lib-release]

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.3.0-beta.5)'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Build and Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: utexo-master
          submodules: recursive

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Update submodule to utexo-master
        run: |
          cd rgb-lib
          git fetch origin utexo-master
          git checkout origin/utexo-master
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android,x86_64-linux-android

      - name: Set version in build files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" build.gradle.kts
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" android/build.gradle.kts

      - name: Build Android library
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: ./gradlew :android:buildAndroidLib

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_SECRET_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format short

      - name: Stage for Maven Central
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: ./gradlew :android:publish

      - name: Publish to Maven Central
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_KEY_NAME: ${{ secrets.GPG_KEY_NAME }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew jreleaserDeploy

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgb-lib-android-${{ steps.version.outputs.version }}
          path: android/build/outputs/aar/*.aar
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## rgb-lib-kotlin v${{ steps.version.outputs.version }}
            
            Kotlin/Android bindings for rgb-lib.
            
            ### Installation (Maven Central)
            ```groovy
            dependencies {
                implementation 'com.utexo:rgb-lib-android:${{ steps.version.outputs.version }}'
            }
            ```
            
            ### Platforms
            - Android arm64 (aarch64)
            - Android x86_64
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          files: android/build/outputs/aar/*.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
