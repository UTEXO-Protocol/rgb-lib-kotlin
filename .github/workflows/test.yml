name: Test Library

on:
  repository_dispatch:
    types: [rgb-lib-release]

  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      bitcoin_network:
        description: 'Bitcoin network (signet, testnet, regtest)'
        required: false
        default: 'signet'
        type: string

  push:
    branches:
      - utexo-master
    paths:
      - 'android/**'
      - 'rgb-lib/**'
      - 'build.gradle.kts'

  pull_request:
    branches:
      - utexo-master

jobs:
  test:
    name: Test (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: utexo-master
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android,x86_64-linux-android

      - name: Build Android library
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: ./gradlew :android:buildAndroidLib

      - name: Run unit tests
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: ./gradlew :android:test

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew :android:connectedAndroidTest
        env:
          BITCOIN_NETWORK: ${{ inputs.bitcoin_network || 'signet' }}
          MNEMONIC: ${{ secrets.TEST_MNEMONIC }}
          ACCOUNT_XPUB_VANILLA: ${{ secrets.TEST_ACCOUNT_XPUB_VANILLA }}
          ACCOUNT_XPUB_COLORED: ${{ secrets.TEST_ACCOUNT_XPUB_COLORED }}
          MASTER_FINGERPRINT: ${{ secrets.TEST_MASTER_FINGERPRINT }}
          INDEXER_URL: ${{ secrets.TEST_INDEXER_URL }}